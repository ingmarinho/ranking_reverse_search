name: Build bundles

# Builds standalone rrs desktop bundles for Windows, macOS (Apple Silicon +
# Intel) and Linux. PyInstaller can't cross-compile, so each target builds on
# its own native runner via scripts/pack.py (the same script you run locally).
#
# Triggers:
#   - push a tag like v1.0.0  -> builds all targets and attaches the zips to the
#                                GitHub Release for that tag
#   - "Run workflow" button   -> builds all targets, zips uploaded as run artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Allow the tag build to create/update the Release and upload assets.
permissions:
  contents: write

# A newer tag/run supersedes an in-flight one.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: macos-latest # Apple Silicon (arm64)
            target: macos-arm64
          - os: ubuntu-latest
            target: linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # yt-dlp needs a JS runtime to solve YouTube's nsig challenge; pack.py
      # bundles whatever `deno` is on PATH.
      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Static ffmpeg + ffprobe on PATH, so the bundled copies run on machines
      # without a system ffmpeg (a dynamically-linked one would not).
      # setup-ffmpeg has no macOS arm64 build, so that target fetches a static
      # arm64 ffmpeg/ffprobe directly (verified: Mach-O arm64, runs standalone).
      - name: Install static ffmpeg + ffprobe
        if: matrix.target != 'macos-arm64'
        uses: federicocarboni/setup-ffmpeg@v3

      - name: Install static ffmpeg + ffprobe (macOS arm64)
        if: matrix.target == 'macos-arm64'
        run: |
          mkdir -p "$HOME/ffmpeg-bin"
          base="https://ffmpeg.martin-riedl.de/redirect/latest/macos/arm64/release"
          curl -fL -o ffmpeg.zip "$base/ffmpeg.zip"
          curl -fL -o ffprobe.zip "$base/ffprobe.zip"
          unzip -oq ffmpeg.zip -d "$HOME/ffmpeg-bin"
          unzip -oq ffprobe.zip -d "$HOME/ffmpeg-bin"
          chmod +x "$HOME/ffmpeg-bin/ffmpeg" "$HOME/ffmpeg-bin/ffprobe"
          echo "$HOME/ffmpeg-bin" >> "$GITHUB_PATH"

      # No [dev] extra: this job only builds, never tests or lints.
      - name: Install Python dependencies
        run: python -m pip install -e . pyinstaller

      - name: Build bundle
        run: python scripts/pack.py

      # shutil.make_archive zips identically on every OS (no zip/Compress-Archive split).
      - name: Zip bundle
        run: python -c "import shutil; shutil.make_archive('rrs-${{ matrix.target }}', 'zip', 'dist/rrs-app')"

      - name: Upload run artifact
        uses: actions/upload-artifact@v4
        with:
          name: rrs-${{ matrix.target }}
          path: rrs-${{ matrix.target }}.zip

      - name: Attach to Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: rrs-${{ matrix.target }}.zip
